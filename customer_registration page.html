<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OYERA AUTO BAY CUSTOMER REGISTRATION</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>
    <a href="index.html">Home</a>
    <div class="container-for-whole-page">
        <div class="signup-card">

            <div class="row g-0 h-100">

                <!-- Left Side -->
                <div class="col-lg-5 form-section">

                    <div class="logo">
                        <h5>Oyera Auto Bay <span class="text-success">Trust us with your vehicle health</span></h5>
                    </div>

                    <hr>

                    <h1 class="welcome-title">
                        Welcome to Oyera Bay Service
                    </h1>

                    <p class="subtitle">
                        Create an account
                    </p>

                    <form>

                        <div class="mb-3">
                            <input type="text" class="form-control custom-input" placeholder="Full name">
                        </div>

                        <div class="mb-3">
                            <input type="email" class="form-control custom-input" placeholder="Email address">
                        </div>

                        <div class="mb-3 position-relative">
                            <input type="password" class="form-control custom-input" placeholder="Create password">

                        </div>

                        <div class="mb-3 position-relative">
                            <input type="password" class="form-control custom-input" placeholder="Repeat password">

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <select class="form-select custom-input">
                                    <option>Select Gender</option>
                                    <option>Male</option>
                                    <option>Female</option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <input type="date" class="form-control custom-input">
                            </div>

                        </div>

                        <button class="btn create-btn w-100">
                            Create an account
                        </button>

                    </form>

                    <div class="terms">
                        By signing up, you accept our
                        <a href="#">Terms of Use</a>
                        and
                        <a href="#">Privacy Policy</a>
                    </div>

                    <hr>

                    <div class="login-link">
                        Already have an account?
                        <a href="#">Log In</a>
                    </div>

                </div>

                <!-- Right Side -->
                <div class="col-lg-7 image-section">

                    <img src="on_heavy_vehicle_rig.jpeg" alt="Nature Image" class="img-fluid h-100 w-100">

                </div>

            </div>

        </div>
    </div>

</body>

</html>
