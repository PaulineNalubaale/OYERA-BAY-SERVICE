<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <title>TECHNICIAN REGISTRATION PAGE_OYERA BAY AUTO SERVICE</title>
</head>

<body>
    <a href="index.html">Home</a>
    <div class="container-for-left-right-sections">
        <div class="row h-100">

            <!-- Left Section -->
            <div class="col-md-5 left-panel d-flex flex-column justify-content-center">

                <div class="card">
                    <div>
                        <h5>Back to Dashboard</h5>
                        <p>Discover Oyera Bay Auto Service</p>
                    </div>
                </div>

                <div class="card">
                    <div>
                        <h5>Customer Registration</h5>
                        <p>Register to be get a full context of Oyera Bay services.</p>
                    </div>
                </div>

                <div class="card">
                    <div>
                        <h5>FAQs</h5>
                        <p>Read about Oyera Auto Spa frequently asked questions.</p>
                    </div>
                </div>

            </div>

            <!-- Right Section -->
            <div class="col-md-7 d-flex align-items-center justify-content-center">

                <div class="signup-card">

                    <h2>Sign up as</h2>
                    <h1 class="text-primary">Oyera Auto Technician</h1>

                    <hr width="50">

                    <form class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Department</label>
                            <input type="text" class="form-control" placeholder="Electrical, Mechanical..">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Full Names</label>
                            <input type="text" class="form-control" placeholder="Enter your name">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Your Role</label>
                            <input type="text" class="form-control" placeholder="Role">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Address</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Next of Kin</label>
                            <input type="number" class="form-control">
                        </div>

                        <div class="col-12">
                            <label class="form-label">Mobile Number</label>
                            <input type="tel" class="form-control">
                        </div>
                        <div class="col-md-8">
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox">
                                <label class="form-check-label">
                                    I agree to the Terms and Conditions
                                </label>
                            </div>
                        </div>

                        <div class="col-md-4 text-end">
                            <button class="btn btn-primary px-5">
                                Sign Up
                            </button>
                        </div>

                    </form>

                </div>

            </div>

        </div>
    </div>

</body>

</html>
